"url": "https://email.4elbows.com/t/y-l-qkyirdl-hdtdkklre-b/"}, {"label": "Unsubscribe", "url": "https://email.4elbows.com/t/y-u-qkyirdl-hdtdkklre-n/"}]}, {"week_number": 7, "subject": "SOCDS 2025/26 Update Week #7 - PreK Orange", "date": "2025-10-18", "text": "Email Ms. Annemarie\nWalking Field Trip to the Firehouse -\nGreat Success\nYour children were so excited to walk to the firehouse and meet the firefighters! They did an excellent job walking with their partners, listening carefully to their teachers, and staying safe together.\nAt the firehouse, the firefighters spoke about fire safety and demonstrated their equipment. They even put on their full gear to show the children what they look like during an emergency—reminding everyone not to be afraid if a firefighter ever comes into their home to help.\nThe highlight of the trip was when each child had the chance to sit in the driver’s seat of the fire engine—what a thrill!\nA big thank-you \r\nto\nSOCDS PEP\nfor providing snacks for the firefighters. Your thoughtfulness was truly appreciated.\nMEND Food Drive\nThank you to every family who participated in our annual food drive. Together, we collected more than\n30 bags\nof food and other nonperishable items! \r\nThe\nshelf-stable milk and cooking oil\nwere especially appreciated by MEND.\nYour generosity shows our children what it means to be part of a caring community—one that looks out for others and helps ensure everyone has what they need.\nGardening with Ms. Linda\nWe’ve been enjoying the crisp fall weather as we continue our study of trees. We learned that there are many kinds of maple trees. We looked carefully at the leaves of three common varieties that are growing at SOCDS: Sugar, Red and Japanese maple trees. We also compared two types of Oak trees (Pin Oak and Black Oak) by comparing the shape \r\nof their leaves, trunks, branching habits and seeds. We learned that Oak trees are the superheroes of the tree world, in fact they are a keystone species. In North America, they support more life forms including fungi, insects, birds and mammals than any other tree genus. We also looked at several tree seedlings in the garden and discussed how their thin stems can grow year after year into a huge tree trunk.\nIt is chilly!\nPlease dress your child appropriately to be outside for 30 minutes at a time.  Good foot wear and a warm hat are useful as many children find heavier jackets constraining.\nIf you have any questions or concerns please text (1-646-226-8790) or email learn@socds.com.\nAnnemarie\nYoungsters Parent Teacher Conference Sign Up\nArt with Ms. Jenny\nMs. Jenny and the children explored how black can be used to accentuate the other colors of the piece.  Children made cats and pumpkins!\nUpcoming\nParent Teacher Zoom Conferences Week of October 27th\nFriday, October 31st - PEP Pizza Cupcake Lunch - Special Wear Pajamas!  (no costumes please)\nTuesday, November 11th - SOCDS Closed in honor of Veterans Day\nDecember 31st - Flu Immunization Proof shared with SOCDS\nClass Directory\nSchool Calendar\nSimplyGourmet Lunch Link\n@SOCDSMOMENTS\nLogistics\nDress Appropriately for the Weather:\nPlease dress your child in appropriate gear for the day.  There is no bad weather just poor clothing.\nMorning Snack\n:  Please send in a morning, and if your child is staying for enrichment please send in an afternoon snack as well.  We generally allow children to choose their food and to listen to their bodies, but if you have any particular preference for what they eat and when, please just label the containers and we will accommodate.  Please remember we are a NUT FREE environment.\nWater Bottles\n:  Please send in a labeled water bottle with your child each day.  We do make sure that they drink water \r\nthroughout the day.  We have two water fountains which we use to refill the bottles (so they may come home full.)\nParking:\nPlease remember that Vose Avenue is an active busy street.  Please pull up on the\nschool side\nof Vose in front of the school.  It is safest to go around the block instead of turning around in driveways.  For your child's safety please try to have them leave your car from the sidewalk side of the car.\nPlease do not block our neighbors driveway, even for a few minutes.\nTuition:\nAs I receive payments I update the statement and send you a copy.  If you do not receive those from me please let me know.\nHours\nMorning Care 7:30-8:30am\nMorning Drop off is between 8:30-9am\nAfternoon Pick Up is between 3:10- 3:20pm\nExtended Day 3:20-5:30/5:45pm\nSouth Orange Country Day School\n461 Vose Avenue, South Orange\n973.762.6451\nYou are receiving this email because your child attends SOCDS.  If you no longer wish to receive these updates, please unsubscribe below.\nUnsubscribe", "links": [{"label": "Email Ms. Annemarie", "url": "https://email.4elbows.com/t/y-l-qhufa-hdtdkklre-y/"}, {"label": "Youngsters Parent Teacher Conference Sign Up", "url": "https://email.4elbows.com/t/y-l-qhufa-hdtdkklre-j/"}, {"label": "Class Directory", "url": "https://email.4elbows.com/t/y-l-qhufa-hdtdkklre-t/"}, {"label": "School Calendar", "url": "https://email.4elbows.com/t/y-l-qhufa-hdtdkklre-i/"}, {"label": "SimplyGourmet Lunch Link", "url": "https://email.4elbows.com/t/y-l-qhufa-hdtdkklre-d/"}, {"label": "@SOCDSMOMENTS", "url": "https://email.4elbows.com/t/y-l-qhufa-hdtdkklre-k/"}, {"label": "Unsubscribe", "url": "https://email.4elbows.com/t/y-u-qhufa-hdtdkklre-u/"}]}, {"week_number": 6, "subject": "SOCDS 2025/26 Update Week #6 - PreK Orange", "date": "2025-10-11", "text": "Email Ms. Annemarie\nReminders:\nSOCDS is closed on Monday, October 13th.  Confires will be on campus to test the fire alarm system.\nSOCDS PEP Mend Food Drive - through next week.  This year, MEND has asked especially for\nshelf-stable milk\nand\ncooking oil\n. As always,\nnon-perishable, non-expired food items\nare welcome. In addition,\nunopened personal care items\nsuch as toothbrushes, \r\ntoothpaste, and soap are much needed.\nSOCDS Kindergarten and PreK Classes will walk to the Fire Department on the morning of Friday, October 17th.  Please return the permission slip that we sent home today, or use the electronic version below.   Please wear your SOCDS School Shirt or a blue t-shirt.\nParent Teacher Conferences - Week of October 27th - sign-ups below\nGardening with Ms. Linda\nThe leaves on our sugar maple trees are starting to change color and drop to the ground. We learned that sugar maples belong to a \r\ngroup of trees that drop their leaves before they go dormant in winter. They are classified as deciduous trees in contrast to our eastern hemlock tree (next to the front entrance of our school) which is evergreen and is classified as a conifer. We started our observations by looking closely at the shape of the sugar maple leaves which are almost as tall as they are wide. They typically have 5 lobes with moderately deep U-shaped notches (sinuses) between lobes. We counted at least 10 sugar maple trees growing at the school so it was easy to find leaves to examine. We compared them to the needle-shaped leaves of the eastern hemlock which have evolved to withstand harsh winters allowing them to stay green all year and retain water and nutrients.\nWe also \r\ndid some work to clear out our garden beds to prepare for winter. We pulled out a tomato plant and two pepper plants because they won’t have a chance to bear fruit before the first frost date. Both plants are sun-loving, hot weather crops. We were not surprised to see that their fibrous roots were 1.5-2 feet deep and wide.\nParent Teacher Conferences\nZoom\nOur teachers are preparing to host\nParent-Teacher Conferences.\nThese are great opportunities for us to share our observations with you.\nPlease click on your child's class link below to sign up for a conference time.\nIf the available dates or times do not work for you, please let me know, and we will arrange an alternative time that fits your schedule.\nTwo days before your scheduled conference, you will receive a Zoom link from Signup Genius to access your \r\nmeeting.\nWeather has Turned!\nPlease dress your child appropriately to be outside for 30 minutes at a time.  Good foot wear and a warm hat are useful as many children find heavier jackets constraining.\nIf you have any questions or concerns please text (1-646-226-8790) or email learn@socds.com.\nAnnemarie\nPreK Orange Parent Teacher Conference Sign Up\nFire Department Walking Field Trip Permission Slip\nArt with Ms. Jenny\nMs. Jenny practiced different line techniques to create monsters!\nUpcoming\nHispanic Heritage Month (September 15th - October 15th)\nMonday, October 13th - Indigenous People's Day - SOCDS Closed\nWeek of October 13th - 17th\nMEND Food Drive - non perishable food goods and personal items\nFriday, October 17th Walking Trip to Fire Department (K and PreK)\nFriday, October 17th MEND Arrives to Pick Up Donations\nParent Teacher Zoom Conferences Week of October 27th\nDecember 31st - Flu Immunization Proof shared with SOCDS\nClass Directory\nSchool Calendar\nSimplyGourmet Lunch Link\n@SOCDSMOMENTS\nLogistics\nDress Appropriately for the Weather:\nPlease dress your child in appropriate gear for the day.  There is no bad weather just poor clothing.\nMorning Snack\n:  Please send in a morning, and if your child is staying for enrichment please send in an afternoon snack as well.  We generally allow children to choose their food and to listen to their bodies, but if you have any particular preference for what they eat and when, please just label the containers and we will accommodate.  Please remember we are a NUT FREE environment.\nWater Bottles\n:  Please send in a labeled water bottle with your child each day.  We do make sure that they drink water \r\nthroughout the day.  We have two water fountains which we use to refill the bottles (so they may come home full.)\nParking:\nPlease remember that Vose Avenue is an active busy street.  Please pull up on the\nschool side\nof Vose in front of the school.  It is safest to go around the block instead of turning around in driveways.  For your child's safety please try to have them leave your car from the sidewalk side of the car.\nPlease do not block our neighbors driveway, even for a few minutes.\nTuition:\nAs I receive payments I update the statement and send you a copy.  If you do not receive those from me please let me know.\nHours\nMorning Care 7:30-8:30am\nMorning Drop off is between 8:30-9am\nAfternoon Pick Up is between 3:10- 3:20pm\nExtended Day 3:20-5:30/5:45pm\nSouth Orange Country Day School\n461 Vose Avenue, South Orange\n973.762.6451\nYou are receiving this email because your child attends SOCDS.  If you no longer wish to receive these updates, please unsubscribe below.\nUnsubscribe", "links": [{"label": "Email Ms. Annemarie", "url": "https://email.4elbows.com/t/y-l-qhiidjl-hdtdkklre-y/"}, {"label": "PreK Orange Parent Teacher Conference Sign Up", "url": "https://email.4elbows.com/t/y-l-qhiidjl-hdtdkklre-j/"}, {"label": "Fire Department Walking Field Trip Permission Slip", "url": "https://email.4elbows.com/t/y-l-qhiidjl-hdtdkklre-t/"}, {"label": "Class Directory", "url": "https://email.4elbows.com/t/y-l-qhiidjl-hdtdkklre-i/"}, {"label": "School Calendar", "url": "https://email.4elbows.com/t/y-l-qhiidjl-hdtdkklre-d/"}, {"label": "SimplyGourmet Lunch Link", "url": "https://email.4elbows.com/t/y-l-qhiidjl-hdtdkklre-k/"}, {"label": "@SOCDSMOMENTS", "url": "https://email.4elbows.com/t/y-l-qhiidjl-hdtdkklre-u/"}, {"label": "Unsubscribe", "url": "https://email.4elbows.com/t/y-u-qhiidjl-hdtdkklre-o/"}]}, {"week_number": 5, "subject": "SOCDS 2025/26 Update Week #5 - PreK Orange", "date": "2025-10-04", "text": "Email Ms. Annemarie\nGetting Ready to Celebrate\nAmerica's 250th Year\nAs our country prepares to celebrate the 250th anniversary of its founding next July, we want to provide children with many opportunities to think about what it means to be an American.\nBecause the children are already familiar with maps and flags as symbols for holidays and cultural recognitions, we will build on this knowledge by exploring American maps from both the past and the present. We will use age-appropriate language, but we will not shy away from discussing difficult truths—much like the way we talk about the murder of Dr. Martin Luther King, Jr.\nThese conversations will begin this fall and continue through July 2026, giving us time to engage with a variety of ideas and reflect on the promise of \r\nAmerica.\nTo start, we will learn Woody Guthrie’s song\nThis Land Is Your Land\n. This work will likely take us several months, and it will connect beautifully to our map explorations while also helping us expand vocabulary and deepen our sense of shared belonging.\nIf you have any thoughts, ideas, or concerns, please share them with us. This is a journey we are taking together, and we deeply value your family’s experiences, insights, and even worries along the way.\nThis Land Is Your Land\nThis land is your land, and this land is my land\nFrom California to the New York Island\nFrom the Redwood Forest to the Gulf Stream Waters\nThis land was made for you and me\nAs I went walking that ribbon of highway\nAnd I saw above me that endless skyway\nI saw below me that golden valley\nThis land was made for you and me\nI roamed and rambled and I followed my footsteps\nTo the sparkling sands of her diamond deserts\nAll around me a voice was a-sounding\nThis land was made for you and me\nThere was a big high wall there that tried to stop me\nSign was painted, said, \"Private Property\"\nBut on the back side, it didn't say nothing\nThis land was made for you and me\nWhen the sun comes shining, then I was strolling\nAnd the wheat fields waving and the dust clouds rolling\nA voice come chanting as the fog was lifting\nThis land was made for you and me\nThis land is your land, and this land is my land\nFrom California to the New York Island\nFrom Redwood Forest to the Gulf Stream Waters\nThis land was made for you and me\nGardening with Ms. Linda\nThe Fall season is the perfect time to begin our study of trees. We discussed the fact that trees are plants. They are among the largest and longest living plants on Earth. We talked about the many ways we depend on trees to give us food and other necessities such as paper and building materials. We learned that trees prevent soil erosion, produce oxygen, absorb carbon dioxide and provide habitats for countless species. Most importantly, trees give us shade on a hot day. We were amazed to discover that a tiny acorn could grow up to be as big as the mighty oak tree in the front yard of our school!\nThe Kindergarteners tasted the pickles they made last week and discussed the importance of knowing how to preserve the fruits and vegetables we harvest.\nMonday, October 13th SOCDS Closed\nMEND Food and Personal Item Drive October 14th-18th\nOur annual drive to support\nMEND (Meeting Essential Needs with Dignity)\nwill take place\nTuesday, October 14th through Friday, October 17th\n. On Friday, the Green Bean Van will visit SOCDS, and the children will have a chance to see firsthand how their thoughtful donations help community members in need. A big thank-you to PEP for helping us organize this important event.\nThis year, MEND has asked especially for\nshelf-stable milk\nand\ncooking oil\n. As always,\nnon-perishable, non-expired food items\nare welcome. In addition,\nunopened personal care items\nsuch as \r\ntoothbrushes, toothpaste, and soap are much needed.\nThank you in advance for your generosity and kindness as we help MEND prepare for the long winter months ahead.\nIf you have any questions or concerns \r\nplease text (1-646-226-8790) or email learn@socds.com.\nAnnemarie\nArt with Ms. Jenny\nThis week the children explored the art of\nPeter Anton\n, a contemporary American artist best known for his giant, realistic sculptures of chocolates, candies, and—of course—donuts.\nInspired by his work, Ms. Jenny invited the children to experiment with clay, rolling, pinching, and sculpting their own creations. Thanks to the warm weather, the pieces dried quickly and were soon ready for the final touch—bright, cheerful paint colors.\nUpcoming\nHispanic Heritage Month (September 15th - October 15th)\nMonday, October 13th - Indigenous People's Day - SOCDS Closed\nWeek of October 13th - 17th\nMEND Food Drive - non perishable food goods and personal items\nFriday, October 17th MEND Arrives to Pick Up Donations\nParent Teacher Zoom Conferences Week of October 27th\nDecember 31st - Flu Immunization Proof shared with SOCDS\nClass Directory\nSchool Calendar\nSimplyGourmet Lunch Link\n@SOCDSMOMENTS\nLogistics\nDress Appropriately for the Weather:\nPlease dress your child in appropriate gear for the day.  There is no bad weather just poor clothing.\nMorning Snack\n:  Please send in a morning, and if your child is staying for enrichment please send in an afternoon snack as well.  We generally allow children to choose their food and to listen to their bodies, but if you have any particular preference for what they eat and when, please just label the containers and we will accommodate.  Please remember we are a NUT FREE environment.\nWater Bottles\n:  Please send in a labeled water bottle with your child each day.  We do make sure that they drink water \r\nthroughout the day.  We have two water fountains which we use to refill the bottles (so they may come home full.)\nParking:\nPlease remember that Vose Avenue is an active busy street.  Please pull up on the\nschool side\nof Vose in front of the school.  It is safest to go around the block instead of turning around in driveways.  For your child's safety please try to have them leave your car from the sidewalk side of the car.\nPlease do not block our neighbors driveway, even for a few minutes.\nTuition:\nAs I receive payments I update the statement and send you a copy.  If you do not receive those from me please let me know.\nHours\nMorning Care 7:30-8:30am\nMorning Drop off is between 8:30-9am\nAfternoon Pick Up is between 3:10- 3:20pm\nExtended Day 3:20-5:30/5:45pm\nSouth Orange Country Day School\n461 Vose Avenue, South Orange\n973.762.6451\nYou are receiving this email because your child attends SOCDS.  If you no longer wish to receive these updates, please unsubscribe below.\nUnsubscribe", "links": [{"label": "Email Ms. Annemarie", "url": "https://email.4elbows.com/t/y-l-qhyllhd-hdtdkklre-y/"}, {"label": "Class Directory", "url": "https://email.4elbows.com/t/y-l-qhyllhd-hdtdkklre-j/"}, {"label": "School Calendar", "url": "https://email.4elbows.com/t/y-l-qhyllhd-hdtdkklre-t/"}, {"label": "SimplyGourmet Lunch Link", "url": "https://email.4elbows.com/t/y-l-qhyllhd-hdtdkklre-i/"}, {"label": "@SOCDSMOMENTS", "url": "https://email.4elbows.com/t/y-l-qhyllhd-hdtdkklre-d/"}, {"label": "Unsubscribe", "url": "https://email.4elbows.com/t/y-u-qhyllhd-hdtdkklre-k/"}]}, {"week_number": 4, "subject": "SOCDS 2025/26 Update Week #4 - PreK Orange", "date": "2025-09-27", "text": "Email Ms. Annemarie\nApple Day\nLots of Fun\nAs a school community, we enjoyed a morning of apple-inspired activities to cap off the first four weeks of school!!\nBack blacktop area:\nChildren measured and weighed apples, experimented with balancing scales, explored a sensory box filled with apple-themed items, and created with lots of playdough.\nFront steps area:\nMs. Jenny led us in\nApple Tree Yoga\nand the children made festive apple headbands.\nGarden area:\nFriends played “apple roll” with red balls and worked hard to keep apple balloons from falling.\nPlayground area:\nWe wrapped up with an apple spoon race and a fun “apple-hole” tossing game.\nIt was a day filled with laughter, bravery in trying new things, and kindness toward friends. Thank you for sharing these wonderful children with us—they made the day truly special!\nGardening with Ms. Linda\nIt’s officially Fall as we celebrate the changing of the seasons by looking carefully at how our garden has transformed in the past few weeks. Our herb garden was beginning to be overrun by grass and weeds. Their roots are strong and must be loosened by digging deep with a shovel before pulling them out. We learned to remove dried stalks by pressing down and then pulling them out. We cut back the tomato plants including one plant that germinated in the compost bin and pushed its way out a hole into the sunshine. We are clearing the beds of dried plant materials before we add a layer of compost and topsoil to prepare for winter. All this “green” material went into the compost bin as an important source of nitrogen. Next, we added water and aerated the pile with a pitchfork. Next week, we will add a layer of dried leaves (as a source of carbon) and \r\ncompleted compost to feed the millions of “decomposers” that do the work of breaking down organic matter and turning it into soil or “black gold”.\nOur Kindergarten children picked all the remaining cucumbers before pulling out the dried plants. To preserve the last of the harvest they made half-sour pickles using a salt brine, garlic, spices and herbs.\nTuesday - PEP Spirit\nPizza Cupcake Lunch\nWear your school t-shirt\nor any blue shirt\nOn\nTuesday, September 30th\n, we will celebrate all September birthdays with a pizza and cupcake lunch. Children with allergies will be accommodated—I’ll reach out to confirm pizza shop and brand details with you directly.\nFor families who order lunch through\nSimply Gourmet\n, please remember that\nWednesday begins a new month\n, so you’ll need to place an order to cover the mid-week \r\nstart.\nIf you have any questions or concerns please text (1-646-226-8790) or email learn@socds.com.\nAnnemarie\nArt with Ms. Jenny\nMs. Jenny introduced the children to one of my favorite art techniques - block printing.  The results are stunning.\nUpcoming\nTuesday, Sept. 30th - PEP Pizza Cupcake Day (wear school t-shirt)\nMonday, October 13th - Indigenous People's Day - SOCDS Closed\nWeek of October 13th - MEND Food Drive - non perishable food goods and personal items\nDecember 31st - Flu Immunization Proof shared with SOCDS\nClass Directory\nSchool Calendar\nSimplyGourmet Lunch Link\n@SOCDSMOMENTS\nLogistics\nDress Appropriately for the Weather:\nPlease dress your child in appropriate gear for the day.  There is no bad weather just poor clothing.\nMorning Snack\n:  Please send in a morning, and if your child is staying for enrichment please send in an afternoon snack as well.  We generally allow children to choose their food and to listen to their bodies, but if you have any particular preference for what they eat and when, please just label the containers and we will accommodate.  Please remember we are a NUT FREE environment.\nWater Bottles\n:  Please send in a labeled water bottle with your child each day.  We do make sure that they drink water \r\nthroughout the day.  We have two water fountains which we use to refill the bottles (so they may come home full.)\nParking:\nPlease remember that Vose Avenue is an active busy street.  Please pull up on the\nschool side\nof Vose in front of the school.  It is safest to go around the block instead of turning around in driveways.  For your child's safety please try to have them leave your car from the sidewalk side of the car.\nPlease do not block our neighbors driveway, even for a few minutes.\nTuition:\nAs I receive payments I update the statement and send you a copy.  If you do not receive those from me please let me know.\nHours\nMorning Care 7:30-8:30am\nMorning Drop off is between 8:30-9am\nAfternoon Pick Up is between 3:10- 3:20pm\nExtended Day 3:20-5:30/5:45pm\nSouth Orange Country Day School\n461 Vose Avenue, South Orange\n973.762.6451\nYou are receiving this email because your child attends SOCDS.  If you no longer wish to receive these updates, please unsubscribe below.\nUnsubscribe", "links": [{"label": "Email Ms. Annemarie", "url": "https://email.4elbows.com/t/y-l-qdkykul-hdtdkklre-y/"}, {"label": "Class Directory", "url": "https://email.4elbows.com/t/y-l-qdkykul-hdtdkklre-j/"}, {"label": "School Calendar", "url": "https://email.4elbows.com/t/y-l-qdkykul-hdtdkklre-t/"}, {"label": "SimplyGourmet Lunch Link", "url": "https://email.4elbows.com/t/y-l-qdkykul-hdtdkklre-i/"}, {"label": "@SOCDSMOMENTS", "url": "https://email.4elbows.com/t/y-l-qdkykul-hdtdkklre-d/"}, {"label": "Unsubscribe", "url": "https://email.4elbows.com/t/y-u-qdkykul-hdtdkklre-k/"}]}, {"week_number": 3, "subject": "SOCDS 2025/26 Update Week #3 - PreK Orange", "date": "2025-09-20", "text": "Email Ms. Annemarie\nFive in a Row\nAll of us at SOCDS truly feel that we have the best jobs in the world. Each day is filled with playing, laughing, learning, and reading alongside your children. They arrive eager for new experiences and hungry to learn.\nThroughout the year, we use a series of books to spark curiosity and inspire connections. These shared stories create a common thread across the school—and the themes often find their way into imaginative play on the playground.\nMost of the books focus on important social-emotional themes such as family, inclusion, \r\nor feelings like being left out, angry, or scared.  We also use these books to celebrate holidays and cultural traditions.\nEach class works with one book for an entire week in a program we call\nFive in a Row\n. Early in the week, teachers guide children through the story itself—exploring the characters, themes, and even the author. Hearing the story multiple times gives all children an opportunity to make connections and build comprehension skills.  Once the children are comfortable with the content, teachers introduce a variety of extension activities inspired by the book, ranging from art and science to geography and more.\nAll classes will experience each of these books over the following six weeks through the end of October:\nAbuela\n. by Arthur Dorros\nA grandmother and grand daughter have imaginative adventures across the city.\nVocabulary: abuela, flock, airport, city, harbor\nLots of Feelings\n. by Shelley Rotner\nExploring a variety of emotions and body language.\nVocabulary: Shy, proud, frightened, curious\nEngineer Ari and the Rosh Hashanah Ride\n. by Deborah Bodin Cohen\nCelebrate the holiday by spreading good wishes, while also remembering that our family and friends are treasures never to be taken for granted.\nVocabulary: challah, shofar, yeshivah, port city\nCan I play too?\nby Mo Willems\nExplore the difference between inclusion and \"not-excluding.\"  Also practicing how to ask to join a group.\nVocabulary: throw, catch, wait, idea, problem solving\nLet's Celebrate Diwali?\nby Anjali Joshi\nLearn about Diwali - the Festival of Lights.\nVocabulary: diya, lengha, kurtas, rangoli\nThe Legend of Spookley - the square pumpkin?\nby Joe Troiano\nBeing different and accepting each other for our own strengths.\nVocabulary: curves, round, square, bruised, sow\nGardening with Ms. Linda\nWe are enjoying the warm, late summer days. This week we focused on seeds---they are all around us as some annual plants are coming to the end of their life cycles and perennials are dying back as they prepare to go dormant during the winter months. Some seeds provide us with essential nutrients that help us grow.  For example, we learned that corn kernels are seeds that may be eaten or dried and planted to grow new corn plants. Corn can be dried and ground to make corn meal used to make tacos or tortillas. We learned that wheat plants grow wheat berries that can be ground to make \r\nflour that may be used to make bread, pasta, cake and even cookies. Other plants in the grass family are oats and rice. We discussed how seeds come in all different shapes and sizes. We held a coconut which was hard on the outside and quite heavy compared to a bean which is small, smooth; they are both seeds. Most important, we discovered that seeds look different yet they are all the same in one way: they each contain a tiny, tiny plant (embryo) inside.\nWe are beginning to clear out our raised beds. One of our cucumber plants was forming small, stunted cucumbers due to its dried and withered stem so we pulled it out and measured the vine which was 9 feet long. Then, we salvaged some seeds from dried pods on a string bean plant and discovered that its vine was 9 ½ feet long!\nMonday:  Apples and Honey,\nFriday: Johnny Appleseed Activities\nOn Monday (September 22nd) we will celebrate Rosh Hashanah with apples and honey and on Friday (September 26th) we will be celebrating Johnny Appleseed Day with a set of activities outside with the entire school.\nSOCDS PEP\nYour class parents have been sending weekly emails and providing information about PEP activities.  If you have not received these emails please let me know \r\nand I will make sure you are connected with your class parents.\nPEP has an instagram account called @SOCDSmoments.  This is a closed, families only account and monitored by parents.\nIf you have any questions or concerns please text (1-646-226-8790) or email learn@socds.com.\nAnnemarie\n@SOCDSMOMENTS\nArt with Ms. Jenny\nMs. Jenny started the still life painting projects.  Children were practicing with sunflowers and apples.\nUpcoming\nHispanic Heritage Month\nEvening Monday, Sept. 22nd - During the day we will be learning about Rosh Hashanah with apples and honey\nFriday, Sept. 26th - 9:30-11:30am Johnny Appleseed Day Activities - No Parents Please\nTuesday, Sept. 30th - PEP Pizza Cupcake Day (wear school t-shirt)\nMonday, October 13th - Indigenous People's Day - SOCDS Closed\nDecember 31st - Flu Immunization Proof shared with SOCDS\nClass Directory\nSchool Calendar\nSimplyGourmet Lunch Link\nLogistics\nDress Appropriately for the Weather:\nPlease dress your child in appropriate gear for the day.  There is no bad weather just poor clothing.\nMorning Snack\n:  Please send in a morning, and if your child is staying for enrichment please send in an afternoon snack as well.  We generally allow children to choose their food and to listen to their bodies, but if you have any particular preference for what they eat and when, please just label the containers and we will accommodate.  Please remember we are a NUT FREE environment.\nWater Bottles\n:  Please send in a labeled water bottle with your child each day.  We do make sure that they drink water \r\nthroughout the day.  We have two water fountains which we use to refill the bottles (so they may come home full.)\nParking:\nPlease remember that Vose Avenue is an active busy street.  Please pull up on the\nschool side\nof Vose in front of the school.  It is safest to go around the block instead of turning around in driveways.  For your child's safety please try to have them leave your car from the sidewalk side of the car.\nPlease do not block our neighbors driveway, even for a few minutes.\nTuition:\nAs I receive payments I update the statement and send you a copy.  If you do not receive those from me please let me know.\nHours\nMorning Care 7:30-8:30am\nMorning Drop off is between 8:30-9am\nAfternoon Pick Up is between 3:10- 3:20pm\nExtended Day 3:20-5:30/5:45pm\nSouth Orange Country Day School\n461 Vose Avenue, South Orange\n973.762.6451\nYou are receiving this email because your child attends SOCDS.  If you no longer wish to receive these updates, please unsubscribe below.\nUnsubscribe", "links": [{"label": "Email Ms. Annemarie", "url": "https://email.4elbows.com/t/y-l-qdtdtdd-hdtdkklre-y/"}, {"label": "@SOCDSMOMENTS", "url": "https://email.4elbows.com/t/y-l-qdtdtdd-hdtdkklre-j/"}, {"label": "Class Directory", "url": "https://email.4elbows.com/t/y-l-qdtdtdd-hdtdkklre-t/"}, {"label": "School Calendar", "url": "https://email.4elbows.com/t/y-l-qdtdtdd-hdtdkklre-i/"}, {"label": "SimplyGourmet Lunch Link", "url": "https://email.4elbows.com/t/y-l-qdtdtdd-hdtdkklre-d/"}, {"label": "Unsubscribe", "url": "https://email.4elbows.com/t/y-u-qdtdtdd-hdtdkklre-k/"}]}, {"week_number": 2, "subject": "SOCDS 2025/26 Update Week #2 - PreK Orange", "date": "2025-09-13", "text": "Email Ms. Annemarie\nWalking in line and\nPreparing for a Fire Drill\nThis week, children have been practicing walking in a line with their classmates. Walking in a line helps us learn to move safely together as a group, whether we are heading outside, going to art, or enjoying gardening with Ms. Linda.  It gives children the chance to practice patience, awareness of personal space, and cooperation—skills that are important for everyday routines and for building a strong classroom community.\nNext week, we will be preparing for our first\nfire drill\nof the school year. Fire drills are an important way for children to learn how to respond calmly and safely in case of an emergency. We practice walking in a line, listening carefully to teachers, and following directions so that everyone feels \r\nconfident and secure if we ever need to leave the building unexpectedly.\nI will also announce the fire drills beforehand, and offer support to any child that has a particular concern.  The teachers have been explaining what to expect, answering questions, and providing children plenty of encouragement so they feel safe.\nMorning Meeting\nOur\nnoon playtime\nis a special part of the day when all the classes are outside together. At other times, classes enjoy the playground at different times, but at noon the whole school shares the space, which gives children a chance to see \r\nfriends from other classrooms.\nAt\n12:30pm\n, we gather for\nMorning Meeting\n. Each class lines up with their teachers, and together we practice calming breathing exercises, sing our school songs, and recite our poem of the month. We also take time to celebrate by singing\nHappy Birthday\nto our special friends!  We also share any important messages or stories to help us build a solid community and help friends make good choices.\nHere are a few of those items:\nPeace Begins with Me\nWe set our fingers with our thumb on our pinky.  We take a deep breath in, hold it, and then release, and move our thumb to each finger and recite \"Peace Begins with Me.\"\nDeep Breath and Hug Ourselves\nWe raise our arms high, take a deep breath, and then give ourselves a squeeze.  On the exhale we say, \"I am here.  I am safe.  I am loved.\"\nThen, we spread our arms wide, take a deep breath, and then give ourselves a squeeze.  On the exhale we say, \"We are here.  We are safe.  We are loved.\"\nMagic Penny Song\nLove is something if you give it away,\nGive it away, give it away.\nLove is something if you give it away,\nYou end up having more.\nIt's just like a magic penny,\nHold it tight and you won't have any.\nLend it, spend it, and you'll have so many\nThey'll roll all over the floor.\nFor love is something if you give it away,\nGive it away, give it away.\nLove is something if you give it away,\nYou end up having more.\nNo bad weather,\njust inappropriate clothing\nSOCDS goes outside in all kinds of weather.  Please dress your child in appropriate weather gear so that they can enjoy the outside for up to 30 minutes.  Foot wear should be closed-toe so that children can run freely.\nGardening with Ms. Linda\nIt’s exciting to begin the new school year. We began observations in the garden by identifying the plants that open their buds in late summer. The New England Aster has begun to bloom with purple petals and yellow composite centers. It is a native North American perennial. It is a valuable food source for late \r\nseason pollinators like bees and butterflies. We also looked closely at daisies and cosmos that are also in bloom. They are all members of the family Asteraceae, one of the largest and most diverse families of flowering plants. We then moved on to our vegetable garden to see if our carrots, string beans, tomatoes and cucumbers were ready to eat. Our last task was to determine if a few of our plants have come to the end of their life cycles. Our corn stalks were dried and ready to be pulled out. We observed that two cucumber plants could no longer support the growth of fully formed fruits because their stems were dry and withered. After pulling out the stems we studied the root systems of each plant.\nFriday September 26th\nJohnny Appleseed Activities\nOn Friday September 26th we will be celebrating Johnny Appleseed Day with a set of activities outside with the entire school. We are using these activity days to give children the chance to explore new experiences together to build a strong sense of community across our school.\nIf you have any creative ideas for age-appropriate activities, please let us know.  For now we have plans for an apple sorting, rolling apples (using red balls), Apple Tree Yoga, and apple tree \"corn-hole.\"\nFor these first few activity days we are not seeking parent volunteers.  It is still difficult for several of our children to separate from parents and seeing \r\nother adults can cause upset.  We will open these activities to families in the spring.\nIf you have any questions or concerns please text (1-646-226-8790) or email learn@socds.com.\nAnnemarie\nArt with Ms. Jenny\nMs. Jenny created a lesson on color and introduced the children to the artwork of\nAlma Woodsey Thomas\n. Thomas was a celebrated African American artist and the first African American woman to have a solo exhibition at the Whitney Museum in New York City.\nAlma Woodsey Thomas was an abstract painter inspired by both nature and space. Her unique style featured\nbright, vibrant colors arranged in mosaic-like patterns\n, often forming circles or radiating bands.\nThe button below links to additional art work examples.\nAlma Woodsey Thomas Art Works\nUpcoming\nHispanic Heritage Month\nEvening Monday, Sept. 22nd - Learning about Rosh Hashanah with apples and honey\nFriday, Sept. 26th - 9:30-11:30am Johnny Appleseed Day Activities - No Parents Please\nTuesday, Sept. 30th - PEP Pizza Cupcake Day (wear school t-shirt)\nMonday, October 13th - Indigenous People's Day - SOCDS Closed\nDecember 31st - Flu Immunization Proof shared with SOCDS\nClass Directory\nSchool Calendar\nSimplyGourmet Lunch Link\nLogistics\nDress Appropriately for the Weather:\nThe weather is settling into warm days. Please consider light clothing, but long shirts and pants.  We do apply sunscreen and bug spray, but the mosquitos are beginning to come out in force.\nMorning Snack\n:  Please send in a morning, and if your child is staying for enrichment please send in an afternoon snack as well.  We generally allow children to choose their food and to listen to their bodies, but if you have any particular preference for what they eat and when, please just label the containers and we will accommodate.  Please remember we are a NUT FREE environment.\nWater Bottles\n:  Please send in a \r\nlabeled water bottle with your child each day.  We do make sure that they drink water throughout the day.  We have two water fountains which we use to refill the bottles (so they may come home full.)\nParking:\nPlease remember that Vose Avenue is an active busy street.  Please pull up on the\nschool side\nof Vose in front of the school.  It is safest to go around the block instead of turning around in driveways.  For your child's safety please try to have them leave your car from the sidewalk side of the car.\nPlease do not block our neighbors driveway, even for a few minutes.\nTuition:\nAs I receive payments I update the statement and send you a copy.  If you do not \r\nreceive those from me please let me know.\nHours\nMorning Care 7:30-8:30am\nMorning Drop off is between 8:30-9am\nAfternoon Pick Up is between 3:10- 3:20pm\nExtended Day 3:20-5:30/5:45pm\nSouth Orange Country Day School\n461 Vose Avenue, South Orange\n973.762.6451\nYou are receiving this email because your child attends SOCDS.  If you no longer wish to receive these updates, please unsubscribe below.\nUnsubscribe", "links": [{"label": "Email Ms. Annemar const today = new Date().toISOString().split('T')[0];

function linkify(text) {
    return text.replace(/(https?:\/\/[^\s<,)]+|bit\.ly\/[^\s<,)]+|tinyurl\.com\/[^\s<,)]+)/gi, function(url) {
        const href = url.match(/^https?:\/\//) ? url : 'https://' + url;
        return `<a href="${href}" target="_blank" rel="noopener">${url}</a>`;
    });
}

const urgencyOrder = { 'today': 0, 'this-week': 1, 'next-week': 2, 'upcoming': 3, 'ongoing': 4 };
const urgencyLabels = { 'today': 'Today', 'this-week': 'This Week', 'next-week': 'Next Week', 'upcoming': 'Coming Up', 'ongoing': 'Ongoing' };

function getUrgency(event) {
    const eventDate = event.date || event.date_start;
    const eventEnd = event.date_end || event.date;
    if (!eventDate) return 'ongoing';
    if (eventEnd && eventEnd < today) return 'expired';
    if (eventDate === today) return 'today';
    const todayDate = new Date(today);
    const evDate = new Date(eventDate);
    const diffDays = Math.ceil((evDate - todayDate) / (1000 * 60 * 60 * 24));
    if (diffDays < 0) {
        if (eventEnd && eventEnd >= today) return 'this-week';
        return 'expired';
    }
    if (diffDays <= 3) return 'this-week';
    if (diffDays <= 10) return 'next-week';
    return 'upcoming';
}

function renderMayaEvents(filter = 'all') {
    const latestWeek = MAYA_DATA.weeks[0];
    if (!latestWeek) return;

    document.getElementById('lastUpdated').textContent =
        `Last updated: ${new Date(MAYA_DATA.last_updated + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
    document.getElementById('mayaSummary').innerHTML =
        `<strong>Latest (${new Date(latestWeek.folder_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}):</strong> ${latestWeek.summary}`;

    let events = latestWeek.events.map(e => ({ ...e, _urgency: getUrgency(e) }));
    if (filter === 'action-needed') events = events.filter(e => ['today', 'this-week', 'next-week'].includes(e._urgency));
    else if (filter !== 'all') events = events.filter(e => e.category === filter);
    events.sort((a, b) => (urgencyOrder[a._urgency] ?? 5) - (urgencyOrder[b._urgency] ?? 5));

    const groups = {};
    events.forEach(e => { const u = e._urgency; if (!groups[u]) groups[u] = []; groups[u].push(e); });

    let html = '';
    ['today', 'this-week', 'next-week', 'upcoming', 'ongoing', 'expired'].forEach(urgency => {
        if (!groups[urgency]) return;
        html += `<div class="section-header"><span class="urgency-dot ${urgency}"></span><h2>${urgencyLabels[urgency] || 'Past'}</h2></div>`;
        groups[urgency].forEach(e => {
            const linksHtml = (e.links && e.links.length)
                ? `<div class="event-links">${e.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join(' ')}</div>` : '';
            html += `<div class="event-card ${urgency}">
                <div class="event-title">${e.title}</div>
                <div class="event-date">${e.date_display}</div>
                <div class="event-details">${linkify(e.details)}</div>
                ${linksHtml}
                <span class="event-category">${e.category.replace('-', ' ')}</span>
            </div>`;
        });
    });
    if (!html) html = '<div class="no-events">No events match this filter.</div>';
    document.getElementById('mayaEvents').innerHTML = html;

    // Archive
    const archiveList = document.getElementById('mayaArchiveList');
    if (MAYA_DATA.weeks.length > 1) {
        archiveList.innerHTML = MAYA_DATA.weeks.slice(1).map((w, idx) => {
            const dateStr = new Date(w.folder_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            const eventsHtml = w.events.map(e => {
                const lh = (e.links && e.links.length) ? ` ${e.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`).join(' ')}` : '';
                return `<div class="archive-event"><div class="event-title">${e.title}</div><div class="event-date">${e.date_display}</div><div class="event-details">${linkify(e.details)}${lh}</div></div>`;
            }).join('');
            return `<div class="archive-item"><div class="archive-header" onclick="this.parentElement.classList.toggle('open')"><div><span class="date">${dateStr}</span> <span class="count">(${w.events.length} items)</span></div><span class="archive-toggle">&#9660;</span></div><div class="archive-body"><div class="archive-summary">${w.summary}</div>${eventsHtml}</div></div>`;
        }).join('');
        document.getElementById('mayaArchive').style.display = 'block';
    } else {
        document.getElementById('mayaArchive').style.display = 'none';
    }
}

function formatNewsletterText(raw) {
    // Clean up the raw text: remove the email/unsubscribe footer, format paragraphs
    let text = raw;
    // Remove footer
    const cutoffs = ['You are receiving this email', 'Unsubscribe', 'If you no longer wish'];
    for (const c of cutoffs) {
        const idx = text.indexOf(c);
        if (idx > 0) text = text.substring(0, idx).trim();
    }
    // Remove "Email Ms. Annemarie" header
    text = text.replace(/^Email Ms\.\s*Annemarie\s*/i, '');
    // Convert line breaks into paragraphs
    const paragraphs = text.split(/\n{2,}/).map(p => p.trim()).filter(p => p);
    return paragraphs.map(p => `<p>${linkify(p.replace(/\n/g, '<br>'))}</p>`).join('');
}

function renderIsaacContent() {
    if (!ISAAC_DATA.weeks || !ISAAC_DATA.weeks.length) return;
    const latest = ISAAC_DATA.weeks[0];

    document.getElementById('isaacSummary').innerHTML =
        `<strong>Week #${latest.week_number} (${new Date(latest.date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}):</strong> ${latest.subject.replace(/SOCDS 2025\/26 Update Week #\d+ - /, '')}`;

    const linksHtml = (latest.links && latest.links.length)
        ? `<div class="newsletter-links">${latest.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label || l.url}</a>`).join('')}</div>` : '';

    document.getElementById('isaacCurrent').innerHTML = `
        <div class="newsletter-card">
            <div class="newsletter-meta">Week #${latest.week_number} - ${latest.subject.replace(/SOCDS 2025\/26 Update Week #\d+ - /, '')}</div>
            <div class="newsletter-text">${formatNewsletterText(latest.text)}</div>

    // Archive

            const className = w.subject.replace(/SOCDS 2025\/26 Update Week #\d+ - /, '');
            const lh = (w.links && w.links.length) ? `<div class="newsletter-links">${w.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.label || l.url}</a>`).join('')}</div>` : '';
            return `<div class="archive-item"><div class="archive-header" onclick="this.parentElement.classList.toggle('open')"><div><span class="date">Week #${w.week_number} - ${dateStr}</span> <span class="count">${className}</span></div><span class="archive-toggle">&#9660;</span></div><div class="archive-body"><div class="newsletter-text" style="font-size:0.88em">${formatNewsletterText(w.text)}</div>${lh}</div></div>`;
        }).join('');
        document.getElementById('isaacArchive').style.display = 'block';
    } else {
        document.getElementById('isaacArchive').style.display = 'none';
    }
}

// Tab switching
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab-btn.${tab}`).classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
}

// Maya filter buttons
document.getElementById('mayaFilterBar').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('#mayaFilterBar .filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderMayaEvents(e.target.dataset.filter);
});

// Initialize
renderMayaEvents();
renderIsaacContent();
</script>
